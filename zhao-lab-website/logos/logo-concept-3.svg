<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Concept 3: Circular emblem — ribosome cross-section with mRNA ring -->
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfeff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
  </defs>

  <!-- Outer ring — mRNA circle -->
  <circle cx="62" cy="65" r="48" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>

  <!-- Codon dots around the ring -->
  <circle cx="62" cy="17" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="100" cy="35" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="108" cy="75" r="4" fill="#f59e0b" opacity="0.5"/>
  <circle cx="90" cy="105" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="55" cy="113" r="4" fill="#f43f5e" opacity="0.5"/>
  <circle cx="20" cy="95" r="4" fill="#0891b2" opacity="0.5"/>
  <circle cx="15" cy="55" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="32" cy="25" r="4" fill="#0ea5e9" opacity="0.5"/>

  <!-- Inner ribosome — large subunit -->
  <ellipse cx="62" cy="70" rx="30" ry="26" fill="url(#innerGrad)" stroke="#0891b2" stroke-width="1.2" opacity="0.8"/>
  <!-- Small subunit -->
  <ellipse cx="62" cy="55" rx="20" ry="13" fill="#f0f4ff" stroke="#7c3aed" stroke-width="1" opacity="0.7"/>

  <!-- Central mRNA threading through -->
  <path d="M38 70 Q48 60 58 70 Q68 80 78 70 Q85 63 90 70"
        stroke="#0891b2" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Three small amino acid dots being made -->
  <circle cx="52" cy="48" r="3" fill="#0ea5e9" opacity="0.7"/>
  <circle cx="62" cy="43" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="72" cy="46" r="3" fill="#f59e0b" opacity="0.6"/>

  <!-- Lab name to the right -->
  <text x="128" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0f172a">
    Zhao
  </text>
  <text x="232" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0891b2">
    Lab
  </text>

  <!-- Tagline -->
  <text x="130" y="80" font-family="Inter, Arial, Helvetica, sans-serif" font-size="11.5" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Translation &amp; Cancer Biology
  </text>

  <!-- Affiliation -->
  <text x="130" y="100" font-family="Inter, Arial, Helvetica, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.3">
    Baylor College of Medicine
  </text>
</svg>
