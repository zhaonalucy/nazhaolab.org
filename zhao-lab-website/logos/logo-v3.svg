<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" width="440" height="160">
  <!--
    Logo v3: Refined Z = mRNA → ribosome → protein
    - 2 colors only: teal (#0891b2) + slate (#334155), with teal opacity variations
    - Clear 40S/60S ribosome subunits at the diagonal junction
    - mRNA (top) flows through ribosome and morphs into protein helix (bottom)
    - Elegant, minimal, scientific
  -->
  <defs>
    <linearGradient id="flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- ====== THE Z ====== -->

  <!-- TOP STROKE: mRNA — smooth sine wave -->
  <path d="M12 30 C22 14, 32 14, 42 30 C52 46, 62 46, 72 30 C82 14, 92 14, 102 30"
        stroke="#0891b2" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Small base-pair ticks hanging down from wave peaks (subtle, structured) -->
  <line x1="27" y1="17" x2="27" y2="24" stroke="#0891b2" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="57" y1="43" x2="57" y2="36" stroke="#0891b2" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="87" y1="17" x2="87" y2="24" stroke="#0891b2" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- 5' label -->
  <text x="1" y="35" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" fill="#0891b2" opacity="0.45">5'</text>

  <!-- DIAGONAL: mRNA flowing down into the ribosome — graceful curve, not a straight line -->
  <path d="M98 33 C95 50, 75 65, 58 72"
        stroke="#0891b2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ======= RIBOSOME at the junction (40S + 60S) ======= -->
  <!-- 60S large subunit — larger rounded shape, bottom -->
  <ellipse cx="50" cy="82" rx="22" ry="16" fill="#0891b2" opacity="0.1" stroke="#0891b2" stroke-width="1.8"/>
  <!-- 40S small subunit — smaller, sits on top -->
  <ellipse cx="50" cy="68" rx="15" ry="9" fill="#0891b2" opacity="0.07" stroke="#0891b2" stroke-width="1.5"/>
  <!-- Channel/groove between subunits where mRNA passes -->
  <line x1="35" y1="75" x2="65" y2="75" stroke="#0891b2" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.3"/>
  <!-- 40S / 60S labels -->
  <text x="40" y="65" font-family="Inter, Arial, sans-serif" font-size="6.5" font-weight="700" fill="#0891b2" opacity="0.5">40S</text>
  <text x="40" y="88" font-family="Inter, Arial, sans-serif" font-size="6.5" font-weight="700" fill="#0891b2" opacity="0.5">60S</text>

  <!-- DIAGONAL continues: from ribosome down to protein — flowing curve -->
  <path d="M42 92 C35 102, 22 110, 14 115"
        stroke="#0891b2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- BOTTOM STROKE: Protein — alpha helix represented as elegant overlapping loops -->
  <!-- Helix backbone -->
  <path d="M12 122 C22 112, 30 112, 38 122 C46 132, 54 132, 62 122 C70 112, 78 112, 86 122 C92 130, 98 130, 104 124"
        stroke="#0891b2" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Helix depth/shadow — offset parallel curve for 3D feel -->
  <path d="M16 126 C24 118, 32 118, 40 126 C48 134, 56 134, 64 126 C72 118, 80 118, 88 126 C94 132, 100 132, 106 128"
        stroke="#0891b2" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- Connecting rungs between the two helix strands (like an alpha helix H-bonds) -->
  <line x1="20" y1="120" x2="22" y2="125" stroke="#0891b2" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="38" y1="122" x2="40" y2="126" stroke="#0891b2" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="50" y1="131" x2="52" y2="134" stroke="#0891b2" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="62" y1="122" x2="64" y2="126" stroke="#0891b2" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>
  <line x1="80" y1="120" x2="82" y2="124" stroke="#0891b2" stroke-width="1.2" opacity="0.2" stroke-linecap="round"/>

  <!-- ====== TEXT ====== -->
  <text x="132" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#1e293b">Zhao</text>
  <text x="256" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#0891b2">Lab</text>

  <!-- Tagline -->
  <text x="134" y="95" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Translation &amp; Cancer Biology
  </text>

  <!-- Affiliation -->
  <text x="134" y="118" font-family="Inter, Arial, Helvetica, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.3">
    Baylor College of Medicine
  </text>
</svg>
