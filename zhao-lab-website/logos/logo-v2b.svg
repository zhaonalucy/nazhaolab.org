<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" width="420" height="150">
  <!--
    Concept 2B: Bolder version — Z as a clear mRNA-to-protein transformation
    Same narrative but more graphic/iconic: thicker elements, bolder colors,
    the protein folds into a helix at the end for visual punch.
    No tiny labels — the visual language alone tells the story.
  -->
  <defs>
    <linearGradient id="mrnaG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="diagG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="protG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- ====== THE "Z" — BOLD VERSION ====== -->

  <!-- TOP: mRNA — thick wavy strand -->
  <path d="M10 30 Q24 12 38 30 Q52 48 66 30 Q80 12 94 30"
        stroke="url(#mrnaG2)" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Three base-pair "teeth" hanging from the mRNA wave peaks -->
  <rect x="22" y="14" width="5" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
  <rect x="50" y="14" width="5" height="10" rx="2" fill="#0ea5e9" opacity="0.3"/>
  <rect x="78" y="14" width="5" height="10" rx="2" fill="#0891b2" opacity="0.3"/>

  <!-- DIAGONAL: Dashed transition line with arrow direction -->
  <path d="M90 35 L20 95"
        stroke="url(#diagG2)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="5 5"/>
  <!-- Arrow head pointing toward protein -->
  <polygon points="16,98 24,98 20,90" fill="#7c3aed" opacity="0.5"/>

  <!-- BOTTOM: Protein — alpha helix-inspired chain of overlapping ovals -->
  <ellipse cx="20" cy="108" rx="9" ry="6" fill="#7c3aed" opacity="0.65" transform="rotate(-10 20 108)"/>
  <ellipse cx="36" cy="106" rx="9" ry="6" fill="#a78bfa" opacity="0.65" transform="rotate(5 36 106)"/>
  <ellipse cx="52" cy="108" rx="9" ry="6" fill="#f43f5e" opacity="0.55" transform="rotate(-10 52 108)"/>
  <ellipse cx="68" cy="106" rx="9" ry="6" fill="#f59e0b" opacity="0.55" transform="rotate(5 68 106)"/>
  <ellipse cx="84" cy="108" rx="9" ry="6" fill="#10b981" opacity="0.55" transform="rotate(-10 84 108)"/>
  <ellipse cx="98" cy="106" rx="7" ry="5" fill="#0ea5e9" opacity="0.4" transform="rotate(5 98 106)"/>

  <!-- Helix backbone line -->
  <path d="M12 108 Q20 100 28 108 Q36 116 44 108 Q52 100 60 108 Q68 116 76 108 Q84 100 92 108 Q98 114 104 108"
        stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- ====== TEXT ====== -->
  <text x="128" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#0f172a">Zhao</text>
  <text x="248" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#0891b2">Lab</text>

  <!-- Tagline -->
  <text x="130" y="88" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Translation &amp; Cancer Biology
  </text>

  <!-- Affiliation -->
  <text x="130" y="110" font-family="Inter, Arial, Helvetica, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="0.3">
    Baylor College of Medicine
  </text>
</svg>
