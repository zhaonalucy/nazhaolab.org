<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Concept 2: The letter Z formed by an mRNA strand with codons -->
  <defs>
    <linearGradient id="mrnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Z-shaped mRNA strand — the letter Z made from a flowing mRNA -->
  <!-- Top horizontal -->
  <path d="M18 25 Q30 18 42 25 Q54 32 66 25 Q78 18 90 25"
        stroke="url(#mrnGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Diagonal -->
  <path d="M88 28 Q72 50 55 65 Q38 80 22 95"
        stroke="url(#mrnGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Bottom horizontal -->
  <path d="M18 98 Q30 91 42 98 Q54 105 66 98 Q78 91 90 98"
        stroke="url(#mrnGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Codon triplet circles along the Z -->
  <!-- Top -->
  <circle cx="30" cy="22" r="4.5" fill="#0891b2" opacity="0.25"/>
  <circle cx="54" cy="28" r="4.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="78" cy="22" r="4.5" fill="#f59e0b" opacity="0.25"/>
  <!-- Diagonal -->
  <circle cx="72" cy="45" r="4" fill="#10b981" opacity="0.25"/>
  <circle cx="54" cy="65" r="4" fill="#f43f5e" opacity="0.25"/>
  <circle cx="36" cy="82" r="4" fill="#0891b2" opacity="0.25"/>
  <!-- Bottom -->
  <circle cx="30" cy="95" r="4.5" fill="#7c3aed" opacity="0.25"/>
  <circle cx="54" cy="101" r="4.5" fill="#0891b2" opacity="0.25"/>
  <circle cx="78" cy="95" r="4.5" fill="#f59e0b" opacity="0.25"/>

  <!-- Small A/U/G/C letters inside some codons -->
  <text x="26" y="25" font-family="Inter, sans-serif" font-size="6" font-weight="700" fill="#0891b2" opacity="0.6">A</text>
  <text x="50" y="31" font-family="Inter, sans-serif" font-size="6" font-weight="700" fill="#7c3aed" opacity="0.6">U</text>
  <text x="74" y="25" font-family="Inter, sans-serif" font-size="6" font-weight="700" fill="#f59e0b" opacity="0.6">G</text>

  <!-- Tiny ribosome icon above the Z -->
  <ellipse cx="54" cy="8" rx="12" ry="7" fill="#ecfeff" stroke="#0891b2" stroke-width="1" opacity="0.6"/>
  <ellipse cx="54" cy="5" rx="8" ry="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>

  <!-- Lab name -->
  <text x="118" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0f172a">
    Zhao
  </text>
  <text x="228" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0891b2">
    Lab
  </text>

  <!-- Tagline -->
  <text x="120" y="82" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Translation &amp; Cancer Biology
  </text>

  <!-- Affiliation -->
  <text x="120" y="103" font-family="Inter, Arial, Helvetica, sans-serif" font-size="10" fill="#94a3b8" letter-spacing="0.3">
    Baylor College of Medicine
  </text>
</svg>
