<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <!-- Concept 1: mRNA strand threading through stylized ribosome -->
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Ribosome — two overlapping rounded shapes -->
  <ellipse cx="60" cy="62" rx="38" ry="32" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <ellipse cx="60" cy="50" rx="26" ry="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" opacity="0.8"/>

  <!-- mRNA strand weaving through -->
  <path d="M10 68 Q25 50 40 68 Q55 86 70 68 Q85 50 100 68 Q108 78 115 68"
        stroke="url(#tealGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Codon dots on mRNA -->
  <circle cx="40" cy="68" r="4" fill="#0891b2" opacity="0.4"/>
  <circle cx="70" cy="68" r="4" fill="#7c3aed" opacity="0.4"/>
  <circle cx="100" cy="68" r="4" fill="#f59e0b" opacity="0.4"/>

  <!-- tRNA arms reaching up -->
  <line x1="40" y1="64" x2="36" y2="42" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="35" cy="40" r="3" fill="#10b981" opacity="0.7"/>
  <line x1="70" y1="64" x2="66" y2="38" stroke="#f43f5e" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="65" cy="36" r="3" fill="#f43f5e" opacity="0.7"/>

  <!-- Polypeptide chain emerging (dotted) -->
  <path d="M36 40 Q30 28 38 22 Q48 16 56 22 Q64 28 58 18"
        stroke="#0ea5e9" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="1 5"/>
  <circle cx="42" cy="20" r="2.5" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="56" cy="18" r="2.5" fill="#7c3aed" opacity="0.5"/>

  <!-- Lab name -->
  <text x="135" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#0f172a">
    Zhao
  </text>
  <text x="135" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#0f172a">
    Zhao
  </text>
  <text x="233" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#0891b2">
    Lab
  </text>

  <!-- Tagline -->
  <text x="136" y="78" font-family="Inter, Arial, Helvetica, sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Translation &amp; Cancer Biology
  </text>

  <!-- Affiliation -->
  <text x="136" y="100" font-family="Inter, Arial, Helvetica, sans-serif" font-size="9.5" fill="#94a3b8" letter-spacing="0.3">
    Baylor College of Medicine
  </text>
</svg>
