<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!--
    Icon-only version of the Z mark
    For favicon, social media, slides, lab merch
    Teal + slate only
  -->

  <!-- TOP: mRNA sine wave -->
  <path d="M12 28 C24 10, 36 10, 48 28 C60 46, 72 46, 84 28 C96 10, 104 14, 110 24"
        stroke="#0891b2" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Base-pair ticks -->
  <line x1="30" y1="14" x2="30" y2="22" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="66" y1="42" x2="66" y2="34" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="96" y1="16" x2="96" y2="24" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- DIAGONAL: flowing curve into ribosome -->
  <path d="M106 28 C100 48, 80 62, 62 72"
        stroke="#0891b2" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- RIBOSOME — 40S + 60S -->
  <!-- 60S large subunit -->
  <ellipse cx="54" cy="84" rx="26" ry="18" fill="#0891b2" opacity="0.1" stroke="#0891b2" stroke-width="2.2"/>
  <!-- 40S small subunit -->
  <ellipse cx="54" cy="68" rx="17" ry="10" fill="#0891b2" opacity="0.07" stroke="#0891b2" stroke-width="1.8"/>
  <!-- mRNA channel groove -->
  <line x1="37" y1="76" x2="71" y2="76" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.25"/>
  <!-- Subunit labels -->
  <text x="44" y="66" font-family="Inter, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#0891b2" opacity="0.45">40S</text>
  <text x="44" y="91" font-family="Inter, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#0891b2" opacity="0.45">60S</text>

  <!-- DIAGONAL continues out of ribosome -->
  <path d="M42 96 C34 106, 22 112, 14 118"
        stroke="#0891b2" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- BOTTOM: Protein alpha helix -->
  <path d="M10 124 C22 112, 34 112, 46 124 C58 136, 70 136, 82 124 C90 116, 100 118, 110 124"
        stroke="#0891b2" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <!-- Helix shadow -->
  <path d="M14 128 C26 118, 38 118, 50 128 C62 138, 74 138, 86 128 C94 122, 102 122, 112 128"
        stroke="#0891b2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.18"/>
  <!-- H-bond rungs -->
  <line x1="22" y1="120" x2="24" y2="126" stroke="#0891b2" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="46" y1="124" x2="50" y2="128" stroke="#0891b2" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="70" y1="134" x2="72" y2="137" stroke="#0891b2" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="86" y1="124" x2="88" y2="126" stroke="#0891b2" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>
